name: Daily Smart YouTube to TikTok

on:
  schedule:
    - cron: '0 15 * * *'
  push:
    # سيشتغل الإجراء الآن فوراً عند رفع أي تعديل على المستودع بالكامل
    branches:
      - main

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp moviepy tiktok-uploader

    - name: Create Cookies File
      run: |
        echo "${{ secrets.TIKTOK_COOKIES }}" > cookies.txt

    - name: Run Auto Video Split and Upload
      run: python automator.py

    - name: Commit and Push State Update
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add state.txt
        git diff-index --quiet HEAD || git commit -m "تحديث تلقائي للحالة: تم حفظ الجزء التالي لليوم القادم"
        git push origin main

name: Daily Smart YouTube to TikTok

on:
  schedule:
    - cron: '0 15 * * *'
  push:
    branches:
      - main

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    # خطوة جوهرية لإصلاح اتصال السيرفر بالإنترنت الخارجي وفك حجب المواقع
    - name: Fix Server DNS and Internet Connection
      run: |
        sudo echo "nameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        sudo echo "nameserver 8.8.4.4" | sudo tee -a /etc/resolv.conf
        ping -c 3 google.com || echo "تنبيه: تم تعديل الـ DNS وجاري فحص الاتصال..."

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade requests moviepy tiktok-uploader yt-dlp

    - name: Create TikTok Cookies File
      run: |
        echo "${{ secrets.TIKTOK_COOKIES }}" > cookies.txt

    - name: Create YouTube Cookies File
      run: |
        echo "${{ secrets.YOUTUBE_COOKIES }}" > youtube_cookies.txt

    - name: Run Auto Video Split and Upload
      run: python automator.py

    - name: Commit and Push State Update
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add state.txt
        git diff-index --quiet HEAD || git commit -m "تحديث تلقائي للحالة: تم حفظ الجزء التالي لليوم القادم"
        git push origin main
